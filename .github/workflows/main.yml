name: Makefile CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs: 
  build:

    runs-on: ubuntu-20.04

    steps:
    - name: Install gcc
      run: sudo apt-get install gcc-arm-linux-gnueabihf 
      
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5.1.0
          
    - name: step1
      run: make -C BaseTools
    - name: step2
      run: source edksetup.sh

    - name: step3
      run: export GCC5_ARM_PREFIX=arm-linux-gnueabihf-

    - name: step4
      run:  export GCC5_ARM_PREFIX=arm-linux-gnueabihf-&& export WORKSPACE=/home/runner/work/edk2-winrt/edk2-winrt && export EDK_TOOLS_PATH=/home/runner/work/edk2-winrt/edk2-winrt/BaseTools && export CONF_PATH=/home/runner/work/edk2-winrt/edk2-winrt/Conf && cd ./BaseTools/BinWrappers/PosixLike && export PATH=$PATH:/home/runner/work/edk2-winrt/edk2-winrt/BaseTools/BinWrappers/PosixLike && ./build -a ARM -t GCC5 -b RELEASE -p ArmVirtPkg/ArmVirtQemuWinRt.dsc && cd ../../../
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v3.1.2
      with:
        name: QEMU_EFI.fd
        path: ./Build/ArmVirtQemuWinRt-ARM/RELEASE_GCC5/FV/QEMU_EFI.fd
